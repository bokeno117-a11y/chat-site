<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
}

#chat{
max-width:900px;
margin:auto;
padding:20px;
min-height:80vh;
overflow-y:auto;
}

.msg{
padding:12px 16px;
margin:10px 0;
border-radius:8px;
max-width:70%;
}

.user{
background:#0b93f6;
margin-left:auto;
}

.bot{
background:#444654;
}

#inputArea{
position:fixed;
bottom:0;
width:100%;
background:#40414f;
padding:15px;
display:flex;
justify-content:center;
}

#inputWrap{
max-width:900px;
width:100%;
display:flex;
}

#input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
background:#19c37d;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<div id="inputWrap">
<input id="input" placeholder="メッセージを入力">
<button onclick="send()">送信</button>
</div>
</div>

<script>

console.log("chat script loaded");

/* conversationId 作成（安全版） */

let conversationId = localStorage.getItem("cid");

if(!conversationId){
conversationId = Math.random().toString(36).substring(2);
localStorage.setItem("cid", conversationId);
}

async function send(){

console.log("send called");

const input = document.getElementById("input");
const message = input.value;

if(!message) return;

const chat = document.getElementById("chat");

/* ユーザーメッセージ表示 */

chat.innerHTML += `<div class="msg user">${message}</div>`;

input.value="";

chat.scrollTop = chat.scrollHeight;

try{

const res = await fetch(
"https://restless-cloud-eec4.bokeno117.workers.dev",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message,
conversationId
})
}
);

const data = await res.json();

/* Botメッセージ表示 */

chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

chat.scrollTop = chat.scrollHeight;

}catch(e){

console.error("fetch error",e);

chat.innerHTML += `<div class="msg bot">接続エラーが発生しました</div>`;

}

}

</script>

</body>
</html>
