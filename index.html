<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>

body{
margin:0;
background:#343541;
font-family:Arial;
color:white;
}

#chat{
max-width:900px;
margin:auto;
padding:20px;
min-height:80vh;
overflow-y:auto;
}

.msg{
padding:12px 16px;
margin:10px 0;
border-radius:8px;
max-width:70%;
}

.user{
background:#0b93f6;
margin-left:auto;
}

.bot{
background:#444654;
}

#inputArea{
position:fixed;
bottom:0;
width:100%;
background:#40414f;
padding:15px;
display:flex;
justify-content:center;
}

#inputWrap{
max-width:900px;
width:100%;
display:flex;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
background:#19c37d;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<div id="inputWrap">
<input id="input" placeholder="メッセージを入力">
<button onclick="send()">送信</button>
</div>
</div>

<script>

// 会話ID生成
let conversationId =
localStorage.getItem("cid") || crypto.randomUUID()

localStorage.setItem("cid", conversationId)

async function send(){

const input = document.getElementById("input")
const message = input.value

if(!message) return

const chat = document.getElementById("chat")

// ユーザー表示
chat.innerHTML += `<div class="msg user">${message}</div>`

input.value=""

chat.scrollTop = chat.scrollHeight

try{

const res = await fetch(
"https://chat-api.bokeno117.workers.dev",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message,
conversationId
})
}
)

const data = await res.json()

// Bot表示
chat.innerHTML += `<div class="msg bot">${data.reply}</div>`

chat.scrollTop = chat.scrollHeight

}catch(e){

chat.innerHTML += `<div class="msg bot">接続エラーが発生しました</div>`

}

}

</script>

</body>
</html>
